# =============================================
#  Backend - Config
# =============================================

# Server
server.port=8080

# ─── Database ───────────────────────────────
# Default to localhost if environment variables aren't set
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mental_health_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Mail (Gmail SMTP) ──────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:studentcare.support@gmail.com}
# Move your password to an environment variable in your local system
# DO NOT hardcode secrets in application.properties!
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ─── OTP Settings ───────────────────────────
app.otp.expiry-minutes=5

# ─── ML Model URL ───────────────────────────
app.ml.model-url=${ML_SERVICE_URL:http://localhost:5000/predict}

# ─── App Settings ───────────────────────────
